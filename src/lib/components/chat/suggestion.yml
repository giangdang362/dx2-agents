kinetix:
  category: Kinetix
  questions:
    - What distinguishes a direct drive system from a traditional indirect drive
      system?
    - Why does ball screw critical speed (whip frequency) pose a limitation that
      direct drive technology eliminates?
    - "Compare ironcore and ironless linear motors across the following
      parameters: cogging force, normal (attraction) force, moving mass, and
      thermal dissipation capability."
    - Why are Voice Coil Motors (VCMs) considered ideal for direct force control
      applications, and what are their typical stroke and bandwidth
      capabilities?
    - What are the two main construction types of Direct Drive Rotary (DDR)
      motors, and when would each be preferred?
    - Define Abbe Error, provide its formula, and calculate the error for a
      system where the encoder is mounted 100 mm below the workpiece and the
      carriage has 5 urad of pitch error.
    - What is the main control challenge of an XY gantry (H-bridge)
      configuration, and why does it arise?
    - Explain the relationship between winding insulation class, motor
      temperature, and insulation lifetime. What is the Arrhenius rule of thumb
      for insulation degradation?
    - A horizontal linear stage has a payload of 10 kg, carriage + motor mass of
      5 kg, and 20 N of friction force. The trapezoidal motion profile specifies
      5 m/s2 acceleration over 0.2 s, 0.6 s cruise at 1 m/s, and 0.2 s
      deceleration, for a 1 s total cycle. Calculate the required RMS force and
      determine the minimum motor continuous force rating with a 25% safety
      margin.
    - What critical precaution must be observed when setting the coolant
      temperature in a liquid-cooled direct drive motor system?
    - Describe the three main types of optical encoder sensing mechanisms and
      explain which achieves the finest resolution.
    - Rank the four magnetic sensor element types (Hall Effect, AMR, GMR, TMR)
      from lowest to highest resolution, and explain the operating principle of
      TMR sensors.
    - Explain the key differences between resolution, repeatability, and
      accuracy in a positioning system. Can a system be highly repeatable but
      inaccurate?
    - What happens to position knowledge when power is lost for an incremental
      encoder versus an absolute encoder?
    - Describe the step-by-step error mapping procedure using a laser
      interferometer. What is the fundamental limitation of error compensation?
    - Compare the EnDat 2.2 and BiSS-C encoder protocols in terms of
      directionality, error detection, and openness of standard.
    - Why must environmental conditions be carefully controlled during laser
      interferometer measurements, and what is the approximate error
      contribution of a 1C temperature change?
    - List the four layers of a modern precision motion control system hierarchy
      from top to bottom, and describe the primary function of each layer.
    - Compare trapezoidal and S-curve motion profiles. Why does the S-curve
      profile produce less residual vibration despite having a longer move time?
    - Why does a servo drive use a cascaded (nested) three-loop control
      architecture instead of a single position control loop?
    - Explain EtherCAT's unique on-the-fly data processing principle and how its
      Distributed Clock mechanism achieves sub-microsecond synchronization.
    - Describe the Ziegler-Nichols tuning method and explain why the resulting
      gains are typically used only as a starting point in servo applications.
    - Explain why mechanical resonances limit servo bandwidth, and describe how
      a notch filter restores gain margin at the resonance frequency.
    - What are the three types of feedforward control used in motion systems,
      and what does each compensate for?
    - What is the steady-state following error formula for a proportional-only
      position loop during constant velocity, and what are the two approaches to
      reduce it?
    - What is Iterative Learning Control (ILC), and what is its key limitation?
    - Name the five levels of the Purdue Reference Model and identify which
      level servo drives and PLCs belong to.
    - What makes OPC-UA's information model fundamentally different from simply
      transporting raw data values? Explain the concept of semantic
      interoperability.
    - List four key failure modes in direct drive motion systems and the
      observable signals used to detect each.
    - What are the four IEC 62443 Security Levels, and what is the typical
      minimum target for a semiconductor fab environment?
    - In a high-speed semiconductor die bonding machine, explain why different
      motor technologies (ironless linear motors, VCMs, and DDR motors) are each
      selected for different axes, and how the control system coordinates them.
    - Why is unsupervised anomaly detection preferred over supervised RUL
      prediction for predictive maintenance of expensive precision motion
      equipment?
    - Describe the practical DMZ architecture for securely sharing data between
      an OT control network and the IT corporate network. What is the role of a
      unidirectional data diode?
    - Describe the four stages of rolling element bearing degradation according
      to ISO 17359, and at which stage should predictive maintenance trigger a
      maintenance action?
    - How are machine learning models deployed at the edge in industrial motion
      control systems, and why is edge deployment preferred over cloud-based
      inference?
    - What is Cosine Error, and how does it compare to Abbe Error in terms of
      growth behavior? Calculate the Cosine Error for a 1 degree misalignment
      across 1 m of travel.
    - What are the key advantages and disadvantages of air bearings compared to
      rolling element bearings in precision stages?
    - What is Cyclic Synchronous Position (CSP) mode in the CiA 402 device
      profile, and why is it the standard for precision multi-axis motion
      control?
    - What is a Disturbance Observer (DOB), and how does it improve servo
      performance without increasing outer loop gains?
    - How does Wiegand wire technology enable battery-free multi-turn absolute
      position tracking in encoders?
