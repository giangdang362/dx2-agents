services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-webui
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      # ── Secrets (must be provided at runtime via -e or --env-file) ──
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY is required}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:?OPENAI_API_BASE_URL is required}
      # ── Optional provider keys ─────────────────────────────────────
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      # ── App config (safe defaults, no .env needed) ─────────────────
      - WEBUI_NAME=${WEBUI_NAME:-C-Agents}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-*}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-*}
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

volumes:
  open-webui-data: {}
